# ── PLP Assessment API — Nginx Reverse Proxy Config ──
#
# Install:  sudo cp deploy/nginx.conf /etc/nginx/sites-available/plp-api
#           sudo ln -s /etc/nginx/sites-available/plp-api /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# SSL:      sudo apt install certbot python3-certbot-nginx
#           sudo certbot --nginx -d your-domain.com

upstream plp_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name your-domain.com;  # ← Replace with your actual domain

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    # ── Proxy to FastAPI ──
    location / {
        proxy_pass http://plp_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts — must match or exceed gunicorn timeout (180s)
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # ── Request limits ──
    client_max_body_size 50M;  # match MAX_AUDIO_SIZE_BYTES

    # ── Security headers ──
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Health check (bypass rate limiting) ──
    location = /api/v1/health {
        proxy_pass http://plp_api;
        access_log off;
    }
}

